<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>DevOps Dashboard Demonstration</h1>

    <div id="logs">
        <h2>Deployment Logs</h2>
        <pre id="log-content">Loading logs...</pre>
    </div>

    <script>
        fetch('Logs/deploy_simulated.log')
            .then(response => response.text())
            .then(data => {
                document.getElementById('log-content').textContent = data;
            })
            .catch(error => {
                document.getElementById('log-content').textContent = "No logs found.";
                console.error("Error loading logs:", error);
            });
    </script>

</body>
</html>
